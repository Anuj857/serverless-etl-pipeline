name: Serverless ETL CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          
      - name: Validate Lambda Syntax
        run: |
          echo "Validating syntax for all Lambda functions..."
          # Find all Python files in the lambdas directory and compile them
          find lambdas -name "*.py" -exec python -m py_compile {} +
          echo "✅ All Python files passed syntax validation!"