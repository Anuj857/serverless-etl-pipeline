version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt || true
  build:
    commands:
      - echo "Validating Lambda Python syntax..."
      - find lambdas -name "*.py" -exec python -m py_compile {} +
  post_build:
    commands:
      - echo "✅ CodeBuild Validation Complete! No syntax errors found."